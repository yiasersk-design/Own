     <script>
// ==========================================
// PROFILE / ACCOUNT PAGE LOGIC
// ==========================================

// ---- Data Helpers ----
function getProfileData() {
    return JSON.parse(localStorage.getItem('metaAINotes_profileData') || '{"name":"My Account","apis":[]}');
}
function saveProfileData(data) {
    localStorage.setItem('metaAINotes_profileData', JSON.stringify(data));
}

// ---- Open / Close Profile Page ----
window.openProfilePage = function() {
    const overlay = document.getElementById('profilePageOverlay');
    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
    setTimeout(() => overlay.style.transform = 'translateY(0)', 10);
    renderProfilePage();
};

window.closeProfilePage = function() {
    const overlay = document.getElementById('profilePageOverlay');
    overlay.style.transform = 'translateY(100%)';
    setTimeout(() => {
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
        overlay.style.transform = '';
    }, 300);
};

// ---- Render Profile Page ----
function renderProfilePage() {
    const data = getProfileData();
    
    // Avatar initials
    const name = data.name || 'My Account';
    document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('profileDisplayName').textContent = name;
    document.getElementById('profileApiCount').textContent = `${data.apis.length} API${data.apis.length !== 1 ? 's' : ''} configured`;
    
    // Active API banner
    const activeIndex = data.apis.findIndex(a => a.isActive);
    const banner = document.getElementById('activeApiBanner');
    if (activeIndex > -1) {
        const active = data.apis[activeIndex];
        document.getElementById('activeApiNameDisplay').textContent = active.name;
        document.getElementById('activeApiEndpointDisplay').textContent = active.endpoint || active.version || 'Custom Endpoint';
        banner.classList.remove('hidden');
        banner.classList.add('flex');
        document.getElementById('profileDot').classList.remove('hidden');
    } else {
        banner.classList.add('hidden');
        banner.classList.remove('flex');
        document.getElementById('profileDot').classList.add('hidden');
    }

    // Notes count
    const sessions = JSON.parse(localStorage.getItem('metaAINotes_sessions') || '[]');
    document.getElementById('settingNotesCountDisplay').textContent = sessions.length;
    
    // API Limit
    const limitData = JSON.parse(localStorage.getItem('metaAINotes_apiLimit') || '{}');
    const dailyLimit = typeof API_DAILY_LIMIT !== 'undefined' ? API_DAILY_LIMIT : 50;
    document.getElementById('settingApiLimitDisplay').textContent = `${limitData.used || 0} / ${dailyLimit}`;

    // API List
    renderApiList(data);
}

// ---- Render API List ----
function renderApiList(data) {
    const container = document.getElementById('apiListContainer');
    const emptyState = document.getElementById('apiEmptyState');
    
    if (!data.apis || data.apis.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        emptyState.classList.add('flex');
        return;
    }
    
    emptyState.classList.add('hidden');
    emptyState.classList.remove('flex');

    container.innerHTML = data.apis.map((api, index) => `
        <div class="bg-white rounded-2xl border ${api.isActive ? 'border-blue-300 shadow-[0_0_0_1px_rgba(59,130,246,0.2)]' : 'border-gray-100'} overflow-hidden shadow-sm transition-all">
            <div class="flex items-center gap-3 px-4 py-3.5">
                <div class="w-10 h-10 rounded-xl ${api.isActive ? 'bg-blue-600' : 'bg-gray-100'} flex items-center justify-center shrink-0 transition-colors">
                    <svg class="w-5 h-5 ${api.isActive ? 'text-white' : 'text-gray-400'}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <span class="text-[15px] font-bold text-gray-800 truncate">${escapeHtml(api.name)}</span>
                        ${api.isActive ? '<span class="shrink-0 px-1.5 py-0.5 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-md uppercase tracking-wide">Active</span>' : ''}
                    </div>
                    <div class="text-[12px] text-gray-400 truncate mt-0.5">${api.version ? escapeHtml(api.version) : 'No model specified'} • ${maskApiKey(api.key)}</div>
                </div>
            </div>
            <div class="flex border-t border-gray-50">
                ${!api.isActive ? `<button onclick="setActiveApi(${index})" class="flex-1 py-2.5 text-[13px] font-semibold text-blue-600 hover:bg-blue-50 transition-colors focus:outline-none flex items-center justify-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                    Set Active
                </button>` : `<div class="flex-1 py-2.5 text-[13px] font-semibold text-green-500 flex items-center justify-center gap-1.5 select-none">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                    Currently Active
                </div>`}
                <div class="w-px bg-gray-50"></div>
                <button onclick="openEditApiModal(${index})" class="px-4 py-2.5 text-[13px] font-semibold text-gray-500 hover:bg-gray-50 transition-colors focus:outline-none flex items-center justify-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Edit
                </button>
                <div class="w-px bg-gray-50"></div>
                <button onclick="deleteApi(${index})" class="px-4 py-2.5 text-[13px] font-semibold text-red-500 hover:bg-red-50 transition-colors focus:outline-none flex items-center justify-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    Delete
                </button>
            </div>
        </div>
    `).join('');
}

// ---- Utilities ----
function maskApiKey(key) {
    if (!key) return 'No key';
    if (key.length <= 8) return '••••••••';
    return key.substring(0, 4) + '••••' + key.slice(-4);
}
function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==========================================
// NEW: DEDICATED API PAGE LOGIC
// ==========================================

window.openAddApiModal = function() {
    document.getElementById('apiPageTitle').textContent = 'Add New API';
    document.getElementById('apiEditIndex').value = '-1';
    document.getElementById('apiInputName').value = '';
    document.getElementById('apiInputKey').value = '';
    document.getElementById('apiInputVersion').value = '';
    document.getElementById('apiInputEndpoint').value = '';
    showApiPage();
};

window.openEditApiModal = function(index) {
    const data = getProfileData();
    const api = data.apis[index];
    document.getElementById('apiPageTitle').textContent = 'Edit API Config';
    document.getElementById('apiEditIndex').value = index;
    document.getElementById('apiInputName').value = api.name || '';
    document.getElementById('apiInputKey').value = api.key || '';
    document.getElementById('apiInputVersion').value = api.version || '';
    document.getElementById('apiInputEndpoint').value = api.endpoint || '';
    showApiPage();
};

function showApiPage() {
    const page = document.getElementById('apiPageOverlay');
    page.classList.remove('hidden');
    page.classList.add('flex');
    // Slide in from right to left
    setTimeout(() => {
        page.classList.remove('translate-x-full');
    }, 10);
}

window.closeApiPage = function() {
    const page = document.getElementById('apiPageOverlay');
    // Slide out to the right
    page.classList.add('translate-x-full');
    setTimeout(() => {
        page.classList.add('hidden');
        page.classList.remove('flex');
    }, 300);
};

window.saveApiFromPage = function() {
    const name = document.getElementById('apiInputName').value.trim();
    const key = document.getElementById('apiInputKey').value.trim();
    const version = document.getElementById('apiInputVersion').value.trim();
    const endpoint = document.getElementById('apiInputEndpoint').value.trim();
    
    if (!name) { 
        if (typeof showToast === 'function') showToast('API Name দিতে হবে।', 'error');
        else alert('API Name দিতে হবে।'); 
        return; 
    }
    if (!key)  { 
        if (typeof showToast === 'function') showToast('API Key দিতে হবে।', 'error');
        else alert('API Key দিতে হবে।'); 
        return; 
    }
    
    const data = getProfileData();
    const editIndex = parseInt(document.getElementById('apiEditIndex').value);
    
    const apiObj = { name, key, version, endpoint, isActive: false };
    
    if (editIndex > -1) {
        apiObj.isActive = data.apis[editIndex].isActive; // preserve active state
        data.apis[editIndex] = apiObj;
        if (typeof showToast === 'function') showToast('API আপডেট হয়েছে!', 'success');
    } else {
        if (data.apis.length === 0) apiObj.isActive = true; // auto-activate first API
        data.apis.push(apiObj);
        if (typeof showToast === 'function') showToast('নতুন API যুক্ত হয়েছে!', 'success');
    }
    
    saveProfileData(data);
    closeApiPage();
    renderProfilePage();
};

window.setActiveApi = function(index) {
    const data = getProfileData();
    data.apis.forEach((a, i) => a.isActive = (i === index));
    saveProfileData(data);
    renderProfilePage();
    if (typeof showToast === 'function') showToast(`"${data.apis[index].name}" সক্রিয় করা হয়েছে!`, 'success');
};

window.deleteApi = function(index) {
    if (!confirm('এই API টি মুছে দিতে চান?')) return;
    const data = getProfileData();
    const wasActive = data.apis[index].isActive;
    data.apis.splice(index, 1);
    if (wasActive && data.apis.length > 0) data.apis[0].isActive = true;
    saveProfileData(data);
    renderProfilePage();
    if (typeof showToast === 'function') showToast('API মুছে ফেলা হয়েছে!', 'success');
};

// ---- Toggle API Key Visibility ----
window.toggleApiKeyVisibility = function() {
    const input = document.getElementById('apiInputKey');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
};

// ---- Profile Name Edit ----
window.openProfileEditModal = function() {
    const data = getProfileData();
    document.getElementById('profileNameInput').value = data.name || '';
    const modal = document.getElementById('profileEditModal');
    const content = document.getElementById('profileEditModalContent');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => content.style.transform = 'translateY(0)', 10);
};

window.closeProfileEditModal = function() {
    const modal = document.getElementById('profileEditModal');
    const content = document.getElementById('profileEditModalContent');
    content.style.transform = 'translateY(100%)';
    setTimeout(() => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        content.style.transform = '';
    }, 300);
};

window.saveProfileName = function() {
    const name = document.getElementById('profileNameInput').value.trim();
    if (!name) return;
    const data = getProfileData();
    data.name = name;
    saveProfileData(data);
    closeProfileEditModal();
    renderProfilePage();
    if (typeof showToast === 'function') showToast('প্রোফাইল আপডেট হয়েছে!', 'success');
};

// ---- Clear All Data ----
window.confirmClearAllData = function() {
    if (!confirm('সমস্ত notes, sessions এবং API data মুছে দেওয়া হবে। আপনি কি নিশ্চিত?')) return;
    const keysToRemove = ['metaAINotes_sessions','metaAINotes_currentSession','metaAINotes_apiLimit','metaAINotes_modelStatuses','metaAINotes_modelResetTimes','metaAINotes_activeModel'];
    keysToRemove.forEach(k => localStorage.removeItem(k));
    if (typeof showToast === 'function') showToast('সমস্ত ডাটা মুছে ফেলা হয়েছে।', 'success');
    renderProfilePage();
};

// ---- Initialize profile dot on load ----
window.addEventListener('DOMContentLoaded', () => {
    const data = getProfileData();
    const hasActive = data.apis.some(a => a.isActive);
    if (hasActive) document.getElementById('profileDot').classList.remove('hidden');
});

// NEW: Proper Preview Page History Tracking System

let previewUndoStack = [];
let previewRedoStack = [];
let isUndoRedoAction = false;

function getPreviewSnapshot() {
    let pagePaperEl = document.getElementById('pagePaper');
    let drawCanvas = document.getElementById('drawCanvas');
    return {
        contentList: JSON.parse(JSON.stringify(typeof contentList !== 'undefined' ? contentList : [])),
        userStyles: JSON.parse(JSON.stringify(typeof userStyles !== 'undefined' ? userStyles : {})),
        userPageMargins: JSON.parse(JSON.stringify(typeof userPageMargins !== 'undefined' ? userPageMargins : {})),
        createdPageData: typeof createdPageData !== 'undefined' && createdPageData ? JSON.parse(JSON.stringify(createdPageData)) : null,
        innerHTML: pagePaperEl ? pagePaperEl.innerHTML : '',
        className: pagePaperEl ? pagePaperEl.className : '',
        style: pagePaperEl ? pagePaperEl.style.cssText : '',
        canvasData: drawCanvas ? drawCanvas.toDataURL() : '',
        hasBorder: window.hasBorder,
        currentBorderStyleClasses: window.currentBorderStyleClasses,
        currentBorderColorClass: window.currentBorderColorClass,
        hasWatermark: window.hasWatermark,
        bgMode: window.bgMode,
        currentColumnGap: window.currentColumnGap,
        templexActiveLayout: window.templexActiveLayout,
        templexHasTopLine: window.templexHasTopLine,
        customHeadingSize: window.userStyles?.customHeadingSize || null
    };
}

// সেভ স্টেট (যেকোনো একশনের আগে কল হবে)
window.savePreviewState = function() {
    if (isUndoRedoAction) return;
    previewUndoStack.push(getPreviewSnapshot());
    if (previewUndoStack.length > 50) previewUndoStack.shift(); // লিমিট ৫০
    previewRedoStack = [];
};

function restorePreviewSnapshot(state) {
    if (typeof contentList !== 'undefined') contentList = JSON.parse(JSON.stringify(state.contentList));
    if (typeof userStyles !== 'undefined') userStyles = JSON.parse(JSON.stringify(state.userStyles));
    if (typeof userPageMargins !== 'undefined') userPageMargins = JSON.parse(JSON.stringify(state.userPageMargins));
    if (typeof createdPageData !== 'undefined' && state.createdPageData) createdPageData = JSON.parse(JSON.stringify(state.createdPageData));
    
    let pagePaperEl = document.getElementById('pagePaper');
    if (pagePaperEl) {
        pagePaperEl.className = state.className || '';
        pagePaperEl.style.cssText = state.style || '';
        pagePaperEl.innerHTML = state.innerHTML || '';
    }
    
    let canvas = document.getElementById('drawCanvas');
    if (canvas && state.canvasData) {
        let ctx = canvas.getContext('2d');
        let img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = state.canvasData;
    } else if (canvas) {
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }
    
    window.hasBorder = state.hasBorder;
    window.currentBorderStyleClasses = state.currentBorderStyleClasses;
    window.currentBorderColorClass = state.currentBorderColorClass;
    window.hasWatermark = state.hasWatermark;
    window.bgMode = state.bgMode;
    window.currentColumnGap = state.currentColumnGap;
    window.templexActiveLayout = state.templexActiveLayout;
    window.templexHasTopLine = state.templexHasTopLine;

    // Draggable Elements রিবাইন্ড করা
    document.querySelectorAll('.cursor-move').forEach(handle => {
        let wrapper = handle.closest('.absolute');
        if (wrapper && typeof makeDraggable === 'function') makeDraggable(wrapper, handle);
    });
    
    if (typeof testFitAndRender === 'function') testFitAndRender();
    if (typeof window.saveCurrentSession === 'function') window.saveCurrentSession();
}

window.performPreviewUndo = function() {
    let activeEl = document.activeElement;
    if (activeEl && activeEl.isContentEditable) {
        document.execCommand('undo'); // টাইপিং এর ক্ষেত্রে নেটিভ ব্রাউজার আনডু
        return;
    }

    if (previewUndoStack.length === 0) {
        if (typeof showTCXToast === 'function') showTCXToast('Nothing to undo');
        return;
    }
    isUndoRedoAction = true;
    previewRedoStack.push(getPreviewSnapshot());
    let prevState = previewUndoStack.pop();
    restorePreviewSnapshot(prevState);
    if (typeof showTCXToast === 'function') showTCXToast('Undo Successful');
    setTimeout(() => { isUndoRedoAction = false; }, 100);
};

window.performPreviewRedo = function() {
    let activeEl = document.activeElement;
    if (activeEl && activeEl.isContentEditable) {
        document.execCommand('redo'); 
        return;
    }

    if (previewRedoStack.length === 0) {
        if (typeof showTCXToast === 'function') showTCXToast('Nothing to redo');
        return;
    }
    isUndoRedoAction = true;
    previewUndoStack.push(getPreviewSnapshot());
    let nextState = previewRedoStack.pop();
    restorePreviewSnapshot(nextState);
    if (typeof showTCXToast === 'function') showTCXToast('Redo Successful');
    setTimeout(() => { isUndoRedoAction = false; }, 100);
};
